<app-card-page title="Dashboard" icon="pi-chart-bar">

  <div class="cards">
  
    <app-card-dashboard class="md:!w-[50%]" title="Veículos cadastrados" icon="pi-car">
      <div class="card-centro">
        <div class="total">
          <p>Total de veículos cadastrados:</p>
          <span>
          {{ veiculos.length }}          
          </span>
          <a routerLink="/restrito/gerenciar-veiculos">Ver detalhes</a>

        </div>
        <p-chart type="doughnut" [data]="data" [options]="options"/>

      </div>

    </app-card-dashboard  >

    <div class="flex flex-col gap-4 sm:gap-2 sm:w-[50%]">

      <div class="flex flex-col md:flex-row flex-wrap  gap-2 w-full">
        <app-card-dashboard class="md:w-[48%]" title="Administradores" icon="pi-user">
          <div class="total-adm">
            <span>
              {{ totalAdministradores }}
            </span>
          </div>
        
        </app-card-dashboard>
        
        <app-card-dashboard class="md:w-[48%]" title="Motoristas" icon="pi-user">
          <div class="total-adm">
            <span>
              {{ totalMotoristas }}
            </span>
        
          </div>
        
        </app-card-dashboard>
      </div>

      <app-card-dashboard class="w-full" title="Movimentações" icon="pi-file">
          
            <p-chart
              type="bar"
              [data]="movimentacaoChart"
              [options]="movimentacaoOptions">
            </p-chart>      
          
        
        </app-card-dashboard>
      
      
      
    </div>
    
  </div>
</app-card-page>
