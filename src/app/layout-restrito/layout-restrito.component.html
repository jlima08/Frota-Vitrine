
<p-toast />
<p-confirmdialog />
<div class="layout">

  <div class="sidebar " [class.closed]="open">    
    <!-- <p class="title">Administrador</p> -->
    <div class="links">
        <a routerLinkActive="link-ativo" (click)="fecharSidebarMobile()" routerLink="/restrito/dashboard"><i class="pi pi-chart-bar"></i> Dashboard</a>
        <a routerLinkActive="link-ativo" (click)="fecharSidebarMobile()" routerLink="/restrito/veiculos"><i class="pi pi-car"></i> Veículos</a>
        <a routerLinkActive="link-ativo" (click)="fecharSidebarMobile()" routerLink="/restrito/relatorio"><i class="pi pi-file"></i> Relatórios</a>
        @if (usuario.role == 'Administrador') {        
          <a routerLinkActive="link-ativo " (click)="fecharSidebarMobile()" routerLink="/restrito/motorista"><i class="pi pi-user"></i> Motoristas</a>
          <a routerLinkActive="link-ativo" (click)="fecharSidebarMobile()" routerLink="/restrito/gerenciar-veiculos">
            <div class="icone-carro" (click)="fecharSidebarMobile()">
              <!-- <i class="pi pi-car"></i>
              <i class="pi pi-cog cog"></i> -->
              <span class="material-symbols-outlined">car_gear</span>
              <p>
                Gerenciar Veículos
  
              </p>

            </div>
          </a>
        }        
        <a routerLinkActive="link-ativo" (click)="fecharSidebarMobile()" routerLink="/restrito/minha-conta"><i class="pi pi-user-edit"></i> Minha conta</a>
    </div>
    <div class="sidebar-end">
      <span class="details-user ">
        <div class="user">
          <p-avatar [label]=" getIniciais(usuario?.nome, usuario?.sobrenome) " styleClass="ml-2" size="normal" />
          <div class="flex flex-col  overflow-hidden">
            <p pTooltip="{{ usuario?.nome }} {{ usuario?.sobrenome }}" class="text-[16px] font-bold overflow-hidden text-ellipsis text-nowrap">{{ usuario?.nome }} {{ usuario?.sobrenome }}</p>
            <p class="text-[10px]">{{ usuario?.role }}</p>
          </div>
        </div>
        
      </span>
    </div>    
  </div>

  <div class="centro">

    <header>
      <div class="gradiente"></div>
        <div class="btns-header" >
          <button class="cursor-pointer sm:invisible" (click)="toggleSidebar()">
            @if (open == false) {
              <p-button icon="pi pi-bars" severity="contrast" outlined="true" ></p-button>
            }@else {
              <p-button icon="pi pi-times" severity="contrast"  ></p-button>
            }
          </button>
          <p-button
          size="small"
          variant="outlined"
          icon="pi pi-sign-out"
          label="Sair"
          severity="danger"
          (onClick)="confirmLogout($event)">
          </p-button>
        </div>
    </header>

    <main>
      <div>
        <router-outlet></router-outlet>
      </div>
    </main>

    
    <footer>
      <span>
        © {{ anoAtual }} - <a target="_blank" href="https://www.linkedin.com/in/jonatas-lima-7bb323240">Jonatas Lima</a>
      </span>
      <span>
        Soares Segurança Eletronica 
      </span>
    </footer>
  </div>
</div>
