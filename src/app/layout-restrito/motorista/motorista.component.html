<app-card-page title="Gerenciar Motoristas" icon="pi-user">
    <p-button label="Novo Motorista" severity="contrast" icon="pi pi-plus" cardPageRight (onClick)="showCadMotorista()" />

     @if (CadMotorista) {
    <div class="cadastrarMotorista">
        <h2 class=""><i class="pi pi-info-circle"></i> Insira as informações do motorista para cadastrar.</h2>
        <form action="">
            <div>
                <p-floatlabel>
                    <input pInputText id="over_label" autocomplete="off"  [(ngModel)]="motorista.nome" name="nome" />
                    <label for="over_label">Nome</label>
                </p-floatlabel>
            </div>
            <div>
                <p-floatlabel>
                    <input pInputText id="over_label" autocomplete="off" [(ngModel)]="motorista.sobrenome" name="sobrenome" />
                    <label for="over_label">Sobrenome</label>
                </p-floatlabel>
            </div>
            <div>
                <p-floatlabel>
                    <input pInputText id="over_label" autocomplete="off" [(ngModel)]="motorista.celular" name="celular"/>
                    <label for="over_label">Celular</label>
                </p-floatlabel>
            </div>
            <div>
               <p-floatlabel>
                    <input pInputText id="over_label" autocomplete="off"  [(ngModel)]="motorista.cargo" name="cargo" />
                    <label for="over_label">Cargo</label>
                </p-floatlabel>
            </div>
            <div>
               <p-floatlabel>
                    <input pInputText id="over_label" autocomplete="off"  [(ngModel)]="motorista.email" name="email" />
                    <label for="over_label">Email</label>
                </p-floatlabel>
            </div>
            <div>
    <p-floatlabel>

        <p-select
            [options]="roles"
            optionLabel="label"
            optionValue="value"
            [(ngModel)]="motorista.role"
            name="role">
        </p-select>

        <label>Perfil</label>

    </p-floatlabel>
</div>

            <div class="btn-form">
                <p-button icon="pi pi-check" label="Salvar" [loading]="loading" (onClick)="salvarMotorista()" [raised]="true"  ></p-button>
                <p-button icon="pi pi-times" label="Cancelar" severity="secondary" [raised]="true" ></p-button>
            </div>
            
        </form>
    </div>

    }

    <div class="listaMotorista">
        <p-table [value]="motoristas" stripedRows [paginator]="true" [rows]="5" [tableStyle]="{ 'min-width': '50rem' }"
            [rowsPerPageOptions]="[5, 10, 20]" [loading]="loading">
            <ng-template pTemplate="header">
                <tr>
                    <th style="width:20%">Nome</th>
                    <th style="width:15%">Celular</th>
                    <th style="width:15%">Cargo</th>
                    <th style="width:20%">Email</th>
                    <th style="width:20%">Permissão</th>
                    <th style="width:25%">Ações</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-customer>
                <tr>
                    <td>{{ customer.nome }} {{ customer.sobrenome }}</td>
                    <td>{{ customer.celular }}</td>
                    <td>{{ customer.cargo }}</td>
                    <td>{{ customer.email }}</td>
                    <td>{{ customer.role }}</td>
                    <td>
                        <p-button icon="pi pi-pencil" raised="true" [rounded]="true" [outlined]="true"  (onClick)="editarMotorista(customer)"></p-button>
                    </td>
                </tr>
            </ng-template>
        </p-table>

    </div>

</app-card-page>
