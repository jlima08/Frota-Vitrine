 <p-toast [showTransitionOptions]="'250ms'" [showTransformOptions]="'translateX(100%)'" [hideTransitionOptions]="'150ms'" [hideTransformOptions]="'translateX(100%)'" />
<div class="main">
    <div class="cardLeft">
        <h2>Gerenciamento de Frota</h2>
    </div>
    <div class="cardRight">
        <span class="sm:hidden block titulo">
            <i class="pi pi-car"></i>
            <h2>Bem vindo </h2>
            <p></p>
        </span>
         <form >
            <h2>Use seu email e senha para fazer o login.</h2>
            <p-floatlabel variant="on">
                <input pInputText id="username" type="email" [(ngModel)]="email" name="username" />
                <label for="username">E-mail</label>
            </p-floatlabel>
            <p-floatlabel variant="on">
                <input pInputText id="password" type="password" [(ngModel)]="senha" name="password" autocomplete="off" />
                <label for="password">Senha</label>
            </p-floatlabel>

            <div class="w-[55%]">
                <p-button styleClass="w-[100%] " icon="pi pi-sign-in" label="Entrar"  [raised]="true" severity="info" (click)="entrar()" />
            </div>


            @if (errorMessage()) {
                <div class="p-error mt-3">{{ errorMessage() }}</div>
            }
        </form>
    </div>
</div>
